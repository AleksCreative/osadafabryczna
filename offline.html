<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f3efe6">
  <title>Brak połączenia — Osada Fabryczna</title>
  <style>
    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      background: #f3efe6;
      color: #423931;
      font: 400 17px/1.5 Arial, sans-serif;
      text-align: center;
    }

    main {
      max-width: 440px;
    }

    h1 {
      margin: 0 0 16px;
      color: #544c45;
      font-family: Georgia, serif;
      font-size: clamp(2rem, 8vw, 3rem);
    }

    p {
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Brak połączenia</h1>
    <p>Sprawdź połączenie z internetem, a następnie spróbuj ponownie.</p>
  </main>
</body>
</html>
